<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrift-Link | Sustainable Fashion Marketplace</title>
    <meta name="description" content="Discover unique, sustainable vintage clothing. Rent or buy timeless pieces at Thrift-Link.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="header">
        <div class="header-logo">Thrift-Link</div>
        <div class="header-search">
            <input type="text" placeholder="Search vintage styles..." aria-label="Search">
        </div>
        <div class="header-actions">
            <a href="login.html" class="btn-outline">Logout</a>
        </div>
    </header>

    <main class="home-container">
        <nav class="category-nav">
            <button class="nav-toggle active" id="mensBtn">Mens Section</button>
            <button class="nav-toggle" id="womensBtn">Womens Section</button>
        </nav>

        <section class="product-grid" id="productGrid">
            <!-- Product 1 -->
            <article class="product-card">
                <div class="product-image-wrap">
                    <span class="badge-unique">Unique Piece</span>
                    <img src="mens_jacket.png" alt="Vintage Corduroy Jacket" class="product-image" onerror="this.src='https://images.unsplash.com/photo-1551028719-00167b16eac5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                </div>
                <div class="product-info">
                    <span class="product-category">Vintage</span>
                    <h2 class="product-title">Classic Corduroy Jacket</h2>
                    <div class="product-pricing">
                        <div class="price-option">
                            <span class="price-label">Buy Now</span>
                            <span class="price-value">$85</span>
                        </div>
                        <div class="price-divider"></div>
                        <div class="price-option" style="text-align: right;">
                            <span class="price-label">3-Day Rental</span>
                            <span class="price-value" style="color: var(--terracotta);">$25</span>
                        </div>
                    </div>
                    <button class="btn-emerald">Reserve for 24h</button>
                </div>
            </article>

            <!-- Product 2 -->
            <article class="product-card">
                <div class="product-image-wrap">
                    <span class="badge-unique">Unique Piece</span>
                    <img src="womens_dress.png" alt="Floral Summer Dress" class="product-image" onerror="this.src='https://images.unsplash.com/photo-1572804013309-59a88b7e92f1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                </div>
                <div class="product-info">
                    <span class="product-category">Boho Chic</span>
                    <h2 class="product-title">Floral Summer Dress</h2>
                    <div class="product-pricing">
                        <div class="price-option">
                            <span class="price-label">Buy Now</span>
                            <span class="price-value">$60</span>
                        </div>
                        <div class="price-divider"></div>
                        <div class="price-option" style="text-align: right;">
                            <span class="price-label">3-Day Rental</span>
                            <span class="price-value" style="color: var(--terracotta);">$18</span>
                        </div>
                    </div>
                    <button class="btn-emerald">Reserve for 24h</button>
                </div>
            </article>

            <!-- Product 3 -->
            <article class="product-card">
                <div class="product-image-wrap">
                    <span class="badge-unique">Unique Piece</span>
                    <img src="vintage_bag.png" alt="Leather Messenger Bag" class="product-image" onerror="this.src='https://images.unsplash.com/photo-1548036328-c9fa89d128fa?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                </div>
                <div class="product-info">
                    <span class="product-category">Accessories</span>
                    <h2 class="product-title">Timeless Leather Bag</h2>
                    <div class="product-pricing">
                        <div class="price-option">
                            <span class="price-label">Buy Now</span>
                            <span class="price-value">$120</span>
                        </div>
                        <div class="price-divider"></div>
                        <div class="price-option" style="text-align: right;">
                            <span class="price-label">3-Day Rental</span>
                            <span class="price-value" style="color: var(--terracotta);">$35</span>
                        </div>
                    </div>
                    <button class="btn-emerald">Reserve for 24h</button>
                </div>
            </article>
        </section>
    </main>
    <script>
        document.getElementById('mensBtn').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('womensBtn').classList.remove('active');
        });
        document.getElementById('womensBtn').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('mensBtn').classList.remove('active');
        });
    </script>
</body>
</html>
